services:
  postgres:
    image: postgres:16-alpine
    container_name: hardwood-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hardwood
    ports:
      - "5432:5432"
    volumes:
      - hardwood_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hardwood"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hardwood_postgres_data:
